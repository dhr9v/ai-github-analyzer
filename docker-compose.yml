version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: reviewer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: reviews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: reviewer_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: reviewer_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/reviews
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=8f5b84931a24d081f9a2e32a688bcae52467fd8a3e74287d60e6e7cb61c36b8e
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - backend_clone_data:/app/data
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build: ./backend
    container_name: reviewer_worker
    command: celery -A workers.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/reviews
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=8f5b84931a24d081f9a2e32a688bcae52467fd8a3e74287d60e6e7cb61c36b8e
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend_clone_data:/app/data
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: reviewer_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  backend_clone_data:
