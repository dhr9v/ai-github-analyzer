name: AI GitHub Code Reviewer CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Ruff Linter Check
      run: |
        python -m ruff check backend/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm install

    - name: Vite Production Build
      working-directory: ./frontend
      run: npm run build

  docker-compile-test:
    runs-on: ubuntu-latest
    needs: [backend-audit, frontend-build]
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Docker Image
      run: docker build -t reviewer-backend-test:latest ./backend

    - name: Build Frontend Docker Image
      run: docker build -t reviewer-frontend-test:latest ./frontend
